x-environment: &env
  GITHUB_TOKEN: GITHUB_TOKEN
  TG_TOKEN: TG_TOKEN
  HCAPTCHA_TOKEN: HCAPTCHA_TOKEN
  REDIS_URL: REDIS_URL

name: container_name
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "3000:3000"
    restart: always
    environment: *env
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: always
    environment: *env

  


